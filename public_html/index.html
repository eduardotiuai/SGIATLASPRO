<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI ATLAS - Acesso ao Sistema</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="assets/css/main.css?v=1.3.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <!-- Brand Side -->
        <div class="auth-brand">
            <div class="auth-logo">SA</div>
            <div class="auth-title">SGI ATLAS</div>
            <div class="auth-subtitle">Sistema de Gestão Integrada</div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-container">
            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <h1 class="auth-heading">Bem-vindo</h1>
                <p class="auth-description">Entre com suas credenciais para acessar o sistema</p>

                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="usuario@tiiuai.com.br"
                        required
                        autocomplete="email"
                    />
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Digite sua senha"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <!-- Remember & Forgot -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="width: 16px; height: 16px; cursor: pointer;" />
                        <span>Lembrar de mim</span>
                    </label>
                    <button type="button" class="btn-text" style="padding: 0;">Esqueceu a senha?</button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">
                    Acessar Sistema
                </button>

                <!-- Demo Info -->
                <div style="margin-top: 2rem; padding: 1rem; background-color: var(--accent-light); border-radius: var(--radius); text-align: center;">
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 0.5rem;">
                        Credenciais de Teste
                    </p>
                    <p style="font-size: 0.875rem; color: var(--text-primary); margin: 0.25rem 0;">
                        usuario@tiiuai.com.br
                    </p>
                    <p style="font-size: 0.875rem; color: var(--text-primary); margin: 0.25rem 0;">
                        123456
                    </p>
                </div>
            </form>

            <!-- Footer -->
            <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--text-tertiary);">
                <p>SGI ATLAS v1.0.0 • TI UAI © 2026</p>
            </div>
        </div>
    </div>

    <script src="assets/js/theme.js?v=1.3.0"></script>
    <script src="assets/js/auth.js?v=1.2.0"></script>
</body>
</html>
