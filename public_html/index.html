<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI ATLAS - Acesso ao Sistema</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="assets/css/main.css?v=1.6.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <!-- Brand Side -->
        <div class="auth-brand">
            <!-- Decorative elements -->
            <div style="position: absolute; top: 20px; right: 20px; font-size: 3rem; opacity: 0.15; color: white;">
                <i class="fas fa-chart-line"></i>
            </div>
            <div style="position: absolute; bottom: 30px; left: 30px; font-size: 2.5rem; opacity: 0.15; color: white;">
                <i class="fas fa-cogs"></i>
            </div>
            <div style="position: absolute; top: 50%; right: 10%; font-size: 2rem; opacity: 0.1; color: white;">
                <i class="fas fa-shield-alt"></i>
            </div>

            <!-- Corporate illustration -->
            <svg style="position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; opacity: 0.2; fill: white;" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Building -->
                <rect x="20" y="80" width="120" height="100" stroke="white" stroke-width="2"/>
                <rect x="40" y="100" width="20" height="20"/>
                <rect x="70" y="100" width="20" height="20"/>
                <rect x="100" y="100" width="20" height="20"/>
                <rect x="40" y="130" width="20" height="20"/>
                <rect x="70" y="130" width="20" height="20"/>
                <rect x="100" y="130" width="20" height="20"/>
                
                <!-- People -->
                <circle cx="180" cy="90" r="8"/>
                <rect x="175" y="100" width="10" height="25"/>
                <line x1="175" y1="108" x2="165" y2="115" stroke="white" stroke-width="2"/>
                <line x1="185" y1="108" x2="195" y2="115" stroke="white" stroke-width="2"/>
                
                <circle cx="240" cy="95" r="8"/>
                <rect x="235" y="105" width="10" height="20"/>
                <line x1="235" y1="112" x2="225" y2="118" stroke="white" stroke-width="2"/>
                <line x1="245" y1="112" x2="255" y2="118" stroke="white" stroke-width="2"/>
                
                <circle cx="300" cy="88" r="8"/>
                <rect x="295" y="98" width="10" height="27"/>
                <line x1="295" y1="106" x2="285" y2="112" stroke="white" stroke-width="2"/>
                <line x1="305" y1="106" x2="315" y2="112" stroke="white" stroke-width="2"/>
                
                <!-- Chart/Graph -->
                <rect x="320" y="120" width="60" height="35" stroke="white" stroke-width="1.5"/>
                <line x1="325" y1="150" x2="325" y2="140" stroke="white" stroke-width="1.5"/>
                <line x1="340" y1="150" x2="340" y2="125" stroke="white" stroke-width="1.5"/>
                <line x1="355" y1="150" x2="355" y2="130" stroke="white" stroke-width="1.5"/>
                <line x1="370" y1="150" x2="370" y2="145" stroke="white" stroke-width="1.5"/>
            </svg>
            
            <div class="auth-logo">SA</div>
            <div class="auth-title">SGI ATLAS</div>
            <div class="auth-subtitle">Sistema de Gestão Integrada</div>
            
            <div style="margin-top: 3rem; text-align: center; position: relative; z-index: 1;">
                <p style="font-size: 0.875rem; opacity: 0.9; line-height: 1.6;">
                    <i class="fas fa-check-circle" style="margin-right: 0.5rem;"></i>
                    Segurança Enterprise<br>
                    <i class="fas fa-lightning-bolt" style="margin-right: 0.5rem;"></i>
                    Performance Otimizada<br>
                    <i class="fas fa-users" style="margin-right: 0.5rem;"></i>
                    Multi-tenant
                </p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-container">
            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <h1 class="auth-heading">Bem-vindo</h1>
                <p class="auth-description">Entre com suas credenciais para acessar o sistema</p>

                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="usuario@tiiuai.com.br"
                        required
                        autocomplete="email"
                    />
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Digite sua senha"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <!-- Remember & Forgot -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="width: 16px; height: 16px; cursor: pointer;" />
                        <span>Lembrar de mim</span>
                    </label>
                    <button type="button" class="btn-text" style="padding: 0;">Esqueceu a senha?</button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">
                    Acessar Sistema
                </button>

                <!-- Request Access Button -->
                <button type="button" class="btn btn-secondary" onclick="requestAccess()" style="margin-top: 0.75rem;">
                    <i class="fas fa-hand-paper" style="margin-right: 0.5rem;"></i>
                    Solicitar Acesso
                </button>

                <!-- Demo Info -->
                <div style="margin-top: 2rem; padding: 1rem; background-color: var(--accent-light); border-radius: var(--radius); text-align: center;">
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 0.5rem;">
                        Credenciais de Teste
                    </p>
                    <p style="font-size: 0.875rem; color: var(--text-primary); margin: 0.25rem 0;">
                        usuario@tiiuai.com.br
                    </p>
                    <p style="font-size: 0.875rem; color: var(--text-primary); margin: 0.25rem 0;">
                        123456
                    </p>
                </div>
            </form>

            <!-- Footer -->
            <div style="margin-top: 2rem; text-align: center; font-size: 0.75rem; color: var(--text-tertiary);">
                <p>SGI ATLAS v1.0.0 • TI UAI © 2026</p>
            </div>
        </div>
    </div>

    <script src="assets/js/theme.js?v=1.6.0"></script>
    <script src="assets/js/auth.js?v=1.6.0"></script>
</body>
</html>
